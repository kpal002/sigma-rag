name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff (lint)
        run: ruff check sigma_rag/ tests/
      - name: Run ruff (format check)
        run: ruff format --check sigma_rag/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + mypy
        run: |
          pip install -e ".[dev]"
          pip install mypy
      - name: Run mypy
        run: mypy sigma_rag/ --ignore-missing-imports

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (minimal deps — no sentence-transformers)
        run: |
          pip install -e ".[dev]"

      - name: Run tests (offline — no API keys required)
        run: |
          pytest tests/ -m "not integration" --cov=sigma_rag --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-with-scipy:
    name: Tests with scipy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with scipy
        run: pip install -e ".[dev,scipy]"
      - name: Run tests
        run: pytest tests/ -m "not integration" -v
